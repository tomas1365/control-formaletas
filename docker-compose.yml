version: "3.9"

services:
  backend:
    build: ./backend
    container_name: unispan-backend
    ports:
      - "5000:5000"
    environment:
      - ROBOFLOW_API_KEY=${ROBOFLOW_API_KEY}
      - ROBOFLOW_PROJECT=${ROBOFLOW_PROJECT:-reconocimiento-de-piezas}
      - ROBOFLOW_VERSION=${ROBOFLOW_VERSION:-1}
      - FLASK_ENV=${FLASK_ENV:-development}
    volumes:
      - ./backend:/app
      - uploads_vol:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: unispan-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads_vol:
