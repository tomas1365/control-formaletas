<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a1628">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>UNISPAN — Captura Dataset</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a1628;
    --surface:  #102a43;
    --border:   rgba(99,125,152,0.25);
    --amber:    #f59e0b;
    --amber2:   #fbbf24;
    --steel:    #627d98;
    --text:     #e2e8f0;
    --text2:    #94a3b8;
    --ok:       #22c55e;
    --danger:   #ef4444;
    --radius:   14px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Inter', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: rgba(10,22,40,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    width: 36px; height: 36px;
    background: var(--amber);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 16px; color: #0a1628;
    flex-shrink: 0;
  }
  header h1 { font-size: 15px; font-weight: 700; line-height: 1.2; }
  header p  { font-size: 11px; color: var(--steel); }

  /* ── Main ── */
  main { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 14px; }

  /* ── Config card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--steel);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 12px;
  }

  label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 4px; }
  input, select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    margin-bottom: 10px;
    outline: none;
    -webkit-appearance: none;
  }
  input:focus, select:focus { border-color: var(--amber); }
  input[type="password"] { letter-spacing: 2px; }

  /* ── Clase selector ── */
  .clases-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .clase-btn {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 6px;
    color: var(--text2);
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    cursor: pointer;
    transition: all .15s;
    user-select: none;
  }
  .clase-btn.active {
    background: rgba(245,158,11,.12);
    border-color: var(--amber);
    color: var(--amber);
  }
  .clase-btn .code { font-size: 10px; color: var(--steel); margin-top: 2px; }

  /* ── Captura ── */
  .capture-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    transition: border-color .2s;
    position: relative;
    overflow: hidden;
  }
  .capture-zone.has-img { border-style: solid; border-color: var(--amber); }
  .capture-zone img {
    width: 100%; height: 100%;
    object-fit: cover;
    position: absolute; inset: 0;
    border-radius: calc(var(--radius) - 2px);
  }
  .capture-zone .overlay {
    position: absolute; inset: 0;
    background: rgba(10,22,40,.55);
    display: flex; align-items: center; justify-content: center;
    border-radius: calc(var(--radius) - 2px);
  }
  .capture-icon { font-size: 40px; }
  .capture-hint { font-size: 13px; color: var(--steel); }

  input[type="file"] { display: none; }

  /* ── Botones acción ── */
  .btn-row { display: flex; gap: 10px; }
  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity .15s, transform .1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-cam  { background: var(--surface); color: var(--text); border: 1.5px solid var(--border); }
  .btn-up   { background: var(--amber); color: #0a1628; }
  .btn-up.loading { background: #b45309; }

  /* ── Progress ── */
  .progress-wrap {
    background: var(--bg);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
    display: none;
  }
  .progress-wrap.show { display: block; }
  .progress-bar {
    height: 100%;
    background: var(--amber);
    border-radius: 99px;
    transition: width .3s;
    width: 0%;
  }

  /* ── Log de subidas ── */
  .log-list { display: flex; flex-direction: column; gap: 8px; max-height: 260px; overflow-y: auto; }
  .log-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
  }
  .log-thumb {
    width: 40px; height: 40px;
    border-radius: 7px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .log-info { flex: 1; min-width: 0; }
  .log-name { font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-meta { color: var(--steel); margin-top: 2px; }
  .log-status { font-size: 16px; flex-shrink: 0; }

  /* ── Contador ── */
  .counter {
    display: flex;
    gap: 10px;
  }
  .counter-item {
    flex: 1;
    background: var(--bg);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .counter-num { font-size: 24px; font-weight: 800; color: var(--amber); }
  .counter-lbl { font-size: 11px; color: var(--steel); margin-top: 2px; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 600;
    transition: transform .3s;
    z-index: 200;
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.ok   { border-color: var(--ok); color: var(--ok); }
  .toast.err  { border-color: var(--danger); color: var(--danger); }

  .section-divider {
    display: flex; align-items: center; gap: 10px;
    color: var(--steel); font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .06em;
  }
  .section-divider::before, .section-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
</style>
</head>
<body>

<header>
  <div class="logo">U</div>
  <div>
    <h1>UNISPAN Dataset</h1>
    <p>Captura de imágenes para entrenamiento IA</p>
  </div>
</header>

<main>

  <!-- Contadores -->
  <div class="counter">
    <div class="counter-item">
      <div class="counter-num" id="cnt-session">0</div>
      <div class="counter-lbl">Esta sesión</div>
    </div>
    <div class="counter-item">
      <div class="counter-num" id="cnt-total">0</div>
      <div class="counter-lbl">Total subidas</div>
    </div>
    <div class="counter-item">
      <div class="counter-num" id="cnt-ok" style="color:var(--ok)">0</div>
      <div class="counter-lbl">Exitosas</div>
    </div>
  </div>

  <!-- Config -->
  <div class="card">
    <div class="card-title">⚙️ Configuración Roboflow</div>
    <label>API Key</label>
    <input type="password" id="api-key" placeholder="rf_xxxxxxxxxxxxxx" autocomplete="off">
    <label>Workspace</label>
    <input type="text" id="workspace" value="tomas1365" autocomplete="off">
    <label>Proyecto</label>
    <input type="text" id="project" value="reconocimiento-de-piezas-rllp1" autocomplete="off">
    <label>Split</label>
    <select id="split">
      <option value="train">Train (entrenamiento)</option>
      <option value="valid">Valid (validación)</option>
      <option value="test">Test (prueba)</option>
    </select>
  </div>

  <!-- Clase -->
  <div class="card">
    <div class="card-title">🏷️ Clase de la pieza</div>
    <div class="clases-grid" id="clases-grid">
      <!-- generado por JS -->
    </div>
    <div style="margin-top:10px">
      <label>Clase personalizada</label>
      <input type="text" id="clase-custom" placeholder="ej. PM-2400x600" style="margin-bottom:0">
    </div>
  </div>

  <!-- Captura -->
  <div class="card">
    <div class="card-title">📸 Imagen</div>
    <div class="capture-zone" id="capture-zone" onclick="document.getElementById('file-input').click()">
      <span class="capture-icon">📷</span>
      <span class="capture-hint">Toca para tomar foto o seleccionar</span>
    </div>
    <input type="file" id="file-input" accept="image/*" capture="environment">

    <div class="progress-wrap" id="progress-wrap" style="margin-top:12px">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
  </div>

  <!-- Botones -->
  <div class="btn-row">
    <button class="btn btn-cam" onclick="document.getElementById('file-input').click()">
      📷 Cámara
    </button>
    <button class="btn btn-up" id="btn-upload" onclick="uploadImage()" disabled>
      ⬆️ Subir
    </button>
  </div>

  <!-- Historial sesión -->
  <div class="section-divider">Historial de sesión</div>
  <div class="log-list" id="log-list">
    <div style="text-align:center;color:var(--steel);font-size:13px;padding:20px">
      Las imágenes subidas aparecerán aquí
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
// ── Clases predefinidas ───────────────────────────────────────────────────────
const CLASES = [
  { label: "PM", desc: "Panel Muro" },
  { label: "PB", desc: "Panel Borde" },
  { label: "EI", desc: "Esquinero" },
  { label: "PM-2400", desc: "2400mm" },
  { label: "PM-1200", desc: "1200mm" },
  { label: "EI-1200", desc: "EI 1200" },
];

let selectedClase = "PM";
let selectedFile  = null;
let sessionCount  = 0;
let totalCount    = parseInt(localStorage.getItem("rf_total") || "0");
let okCount       = parseInt(localStorage.getItem("rf_ok") || "0");

// Init
document.getElementById("cnt-total").textContent = totalCount;
document.getElementById("cnt-ok").textContent    = okCount;

// Cargar API key guardada
const savedKey = localStorage.getItem("rf_api_key");
if (savedKey) document.getElementById("api-key").value = savedKey;

// Guardar API key al cambiar
document.getElementById("api-key").addEventListener("blur", () => {
  localStorage.setItem("rf_api_key", document.getElementById("api-key").value.trim());
});

// Render clases grid
const grid = document.getElementById("clases-grid");
CLASES.forEach(c => {
  const btn = document.createElement("div");
  btn.className = "clase-btn" + (c.label === selectedClase ? " active" : "");
  btn.innerHTML = `<div>${c.label}</div><div class="code">${c.desc}</div>`;
  btn.onclick = () => {
    document.querySelectorAll(".clase-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    selectedClase = c.label;
    document.getElementById("clase-custom").value = "";
  };
  grid.appendChild(btn);
});

document.getElementById("clase-custom").addEventListener("input", e => {
  if (e.target.value.trim()) {
    document.querySelectorAll(".clase-btn").forEach(b => b.classList.remove("active"));
    selectedClase = e.target.value.trim().toUpperCase();
  }
});

// File input
document.getElementById("file-input").addEventListener("change", e => {
  const f = e.target.files[0];
  if (!f) return;
  selectedFile = f;
  const url = URL.createObjectURL(f);
  const zone = document.getElementById("capture-zone");
  zone.innerHTML = `
    <img src="${url}" alt="preview">
    <div class="overlay">
      <span style="color:white;font-size:13px;font-weight:600">✓ ${f.name.slice(0,30)}</span>
    </div>`;
  zone.classList.add("has-img");
  document.getElementById("btn-upload").disabled = false;
});

// Upload
async function uploadImage() {
  const apiKey    = document.getElementById("api-key").value.trim();
  const workspace = document.getElementById("workspace").value.trim();
  const project   = document.getElementById("project").value.trim();
  const split     = document.getElementById("split").value;
  const clase     = selectedClase;

  if (!apiKey)     { showToast("⚠️ Ingresa tu API Key", "err"); return; }
  if (!selectedFile) { showToast("⚠️ Selecciona una imagen", "err"); return; }
  if (!clase)      { showToast("⚠️ Selecciona una clase", "err"); return; }

  const btn = document.getElementById("btn-upload");
  btn.disabled = true;
  btn.innerHTML = "⏳ Subiendo…";
  btn.classList.add("loading");

  // Progress animation
  const pw = document.getElementById("progress-wrap");
  const pb = document.getElementById("progress-bar");
  pw.classList.add("show");
  pb.style.width = "30%";

  try {
    // Convertir a base64
    const b64 = await fileToBase64(selectedFile);
    pb.style.width = "60%";

    // Nombre del archivo con clase incluida para facilitar re-etiquetado
    const ts   = Date.now();
    const ext  = selectedFile.name.split(".").pop() || "jpg";
    const name = `${clase}_${ts}.${ext}`;

    // Subir a Roboflow Upload API
    const url = `https://api.roboflow.com/dataset/${project}/upload` +
                `?api_key=${apiKey}&name=${encodeURIComponent(name)}` +
                `&split=${split}&annotation_labelmap=${encodeURIComponent(clase)}`;

    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: b64.split(",")[1],
    });

    pb.style.width = "90%";
    const data = await res.json();

    if (!res.ok || data.error) {
      throw new Error(data.error || `HTTP ${res.status}`);
    }

    pb.style.width = "100%";

    // Actualizar contadores
    sessionCount++;
    totalCount++;
    okCount++;
    localStorage.setItem("rf_total", totalCount);
    localStorage.setItem("rf_ok", okCount);
    document.getElementById("cnt-session").textContent = sessionCount;
    document.getElementById("cnt-total").textContent   = totalCount;
    document.getElementById("cnt-ok").textContent      = okCount;

    // Log
    addLog(selectedFile, clase, split, true, "");
    showToast(`✅ ${clase} subida a ${split}`, "ok");

    // Reset
    resetCapture();

  } catch (err) {
    pb.style.width = "100%";
    pb.style.background = "var(--danger)";
    addLog(selectedFile, clase, split, false, err.message);
    showToast(`❌ ${err.message.slice(0, 50)}`, "err");
    setTimeout(() => {
      pb.style.background = "var(--amber)";
      pb.style.width = "0%";
      pw.classList.remove("show");
    }, 2000);
  } finally {
    setTimeout(() => {
      pb.style.width = "0%";
      pw.classList.remove("show");
    }, 1500);
    btn.disabled = false;
    btn.innerHTML = "⬆️ Subir";
    btn.classList.remove("loading");
  }
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result);
    r.onerror = () => rej(new Error("Error leyendo archivo"));
    r.readAsDataURL(file);
  });
}

function resetCapture() {
  selectedFile = null;
  const zone = document.getElementById("capture-zone");
  zone.innerHTML = `<span class="capture-icon">📷</span><span class="capture-hint">Toca para tomar otra foto</span>`;
  zone.classList.remove("has-img");
  document.getElementById("file-input").value = "";
  document.getElementById("btn-upload").disabled = true;
}

function addLog(file, clase, split, ok, errMsg) {
  const list = document.getElementById("log-list");
  // Quitar placeholder
  if (list.children.length === 1 && list.children[0].style.textAlign === "center") {
    list.innerHTML = "";
  }
  const url   = URL.createObjectURL(file);
  const item  = document.createElement("div");
  item.className = "log-item";
  item.innerHTML = `
    <img class="log-thumb" src="${url}" alt="">
    <div class="log-info">
      <div class="log-name">${clase} → ${split}</div>
      <div class="log-meta">${ok ? "✓ Subida exitosa" : "✗ " + errMsg}</div>
    </div>
    <span class="log-status">${ok ? "✅" : "❌"}</span>`;
  list.insertBefore(item, list.firstChild);
}

function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className   = `toast ${type} show`;
  setTimeout(() => t.classList.remove("show"), 2800);
}
</script>
</body>
</html>
