services:
  - type: web
    name: unispan-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 "app:create_app()"
    envVars:
      - key: ROBOFLOW_API_KEY
        sync: false          # set manually in Render dashboard
      - key: ROBOFLOW_PROJECT
        value: reconocimiento-de-piezas
      - key: ROBOFLOW_VERSION
        value: "1"
      - key: FLASK_ENV
        value: production
